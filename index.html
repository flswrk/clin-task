<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ IMPORTANT: Mobile behavior -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">

  <!-- App meta -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Flosswork">

  <title>Flosswork</title>

  <!-- ✅ FIX: CSS MUST be here -->
  <link rel="stylesheet" href="theme.css?v=1">
</head>

<body>

  <div id="app" class="app-shell">

    <!-- Header -->
    <header class="topbar">
      <div class="topbar-row">
        <div class="topbar-copy">
          <div class="brand-lockup">
            <span class="brand-logo-wrap">
              <img class="brand-logo" src="logo.png" onerror="this.style.display='none'">
              <span class="brand-logo-fallback">F</span>
            </span>
            <div class="brand-copy">
              <p class="eyebrow">Task board</p>
              <h1 class="topbar-brand">Flosswork</h1>
            </div>
          </div>
        </div>
        <button class="header-action" onclick="openModal(null)">New</button>
      </div>
    </header>

    <main class="page-shell">

      <!-- Overview -->
      <section class="surface-card summary-card">
        <div class="section-head">
          <div>
            <p class="section-kicker">Overview</p>
            <h2 class="section-title">Today’s workload</h2>
          </div>
          <span class="summary-total" id="task-count"></span>
        </div>
        <div class="stats-grid" id="stats-row"></div>
      </section>

      <!-- Filters -->
      <section class="surface-card controls-card">
        <div class="section-head">
          <div>
            <p class="section-kicker">Organize</p>
            <h2 class="section-title">Filter your tasks</h2>
          </div>
        </div>

        <div class="controls-grid controls-grid-compact">

          <div class="field-group">
            <label class="field-label">Category</label>
            <select class="field-input field-select" id="cat-filter" onchange="render()">
              <option value="All">All</option>
              <option>Clinical</option>
              <option>Finance</option>
              <option>Operations</option>
              <option>Growth</option>
              <option>Systems</option>
              <option>Compliance</option>
            </select>
          </div>

          <div class="field-group">
            <label class="field-label">Status</label>
            <select class="field-input field-select" id="status-filter" onchange="render()">
              <option value="Active">Active</option>
              <option value="All">All</option>
              <option>Not Started</option>
              <option>In Progress</option>
              <option>On Hold</option>
              <option>Done</option>
            </select>
          </div>

          <div class="field-group">
            <label class="field-label">Sort</label>
            <select class="field-input field-select" id="sort-filter" onchange="setSort(this.value)">
              <option value="score">Score</option>
              <option value="name">A-Z</option>
              <option value="due">Due</option>
            </select>
          </div>

        </div>
      </section>

      <!-- Tasks -->
      <section id="list-wrap" class="task-sections"></section>

    </main>

    <!-- CTA -->
    <div class="bottom-cta">
      <button class="cta-button" onclick="openModal(null)">Add Task</button>
    </div>

  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="overlay" style="display:none" onclick="overlayClick(event)">
    <div class="modal">

      <div class="modal-header">
        <div>
          <p class="section-kicker">Task details</p>
          <div class="modal-title">New Task</div>
        </div>
      </div>

      <div class="modal-body">

        <input class="field-input" id="f-title" placeholder="Task title">

        <select class="field-input" id="f-status">
          <option>Not Started</option>
          <option>In Progress</option>
          <option>On Hold</option>
          <option>Done</option>
        </select>

        <select class="field-input" id="f-cat">
          <option>Clinical</option>
          <option>Finance</option>
          <option>Operations</option>
          <option>Growth</option>
          <option>Systems</option>
          <option>Compliance</option>
        </select>

        <input type="date" class="field-input" id="f-due">
        <input class="field-input" id="f-assigned" placeholder="Assigned to">
        <textarea class="field-input" id="f-notes"></textarea>

      </div>

      <div class="modal-footer">
        <button onclick="closeModal()">Cancel</button>
        <button onclick="saveTask()">Save Task</button>
      </div>

    </div>
  </div>

  <div id="fw-toast"></div>

  <!-- ✅ FIX: JS at bottom -->
  <script src="supabase-config.js?v=1"></script>
  <script src="logic.js?v=1"></script>
  <script src="ui.js?v=1"></script>

</body>
</html>
